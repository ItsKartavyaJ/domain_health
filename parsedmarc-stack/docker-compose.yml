# Pintel DMARC Stack
# Services:
#   parsedmarc     - checks Gmail DMARC inbox on a schedule and writes reports to /data/aggregate.json
#   influx_writer  - tails aggregate.json and writes DMARC points to InfluxDB
#   influxdb       - time-series DB shared with deliverability_monitor
#   caddy          - reverse proxy for InfluxDB
#
# All data is persisted in named Docker volumes.
# Run: docker compose up -d

services:
  parsedmarc:
    build:
      context: ./parsedmarc
      dockerfile: Dockerfile
    container_name: parsedmarc
    restart: unless-stopped
    env_file: ../.env
    environment:
      PARSEDMARC_MAILBOX_BATCH_SIZE: "${PARSEDMARC_MAILBOX_BATCH_SIZE:-10}"
      PARSEDMARC_RUN_INTERVAL_SECONDS: "${PARSEDMARC_RUN_INTERVAL_SECONDS:-3600}"
      AGGREGATE_LOCK_DIR: "/data/aggregate.lock"
      PARSEDMARC_HEARTBEAT_FILE: "/tmp/parsedmarc.heartbeat"
      PARSEDMARC_MAILBOX_REPORTS_FOLDER: "INBOX"
      PARSEDMARC_MAILBOX_ARCHIVE_FOLDER: "Archive"
      PARSEDMARC_IMAP_HOST: "${DMARC_IMAP_HOST}"
      PARSEDMARC_IMAP_PORT: "${DMARC_IMAP_PORT}"
      PARSEDMARC_IMAP_USER: "${DMARC_MAILBOX_USER}"
      PARSEDMARC_IMAP_PASSWORD: "${DMARC_MAILBOX_APP_PASSWORD}"
    volumes:
      - parsedmarc_data:/data
    depends_on:
      influxdb:
        condition: service_healthy
      influx_writer:
        condition: service_started
    networks:
      - dmarc_net
    mem_limit: 512m
    cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/parsedmarc.heartbeat && find /tmp/parsedmarc.heartbeat -mmin -180 | grep -q ."]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  influx_writer:
    build:
      context: ./influx_writer
      dockerfile: Dockerfile
    container_name: influx_writer
    restart: unless-stopped
    env_file: ../.env
    environment:
      INFLUX_URL: "http://influxdb:8086"
      INFLUX_ORG: "${INFLUXDB_ORG}"
      INFLUX_TOKEN: "${INFLUXDB_TOKEN}"
      INFLUX_BUCKET: "${INFLUXDB_DMARC_BUCKET}"
      AGGREGATE_FILE: "/data/aggregate.json"
      AGGREGATE_LOCK_DIR: "/data/aggregate.lock"
      POLL_INTERVAL: "60"
    volumes:
      - parsedmarc_data:/data
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - dmarc_net
    mem_limit: 256m
    cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  influxdb:
    image: influxdb:2.7-alpine
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: "${INFLUXDB_ADMIN_USER}"
      DOCKER_INFLUXDB_INIT_PASSWORD: "${INFLUXDB_ADMIN_PASSWORD}"
      DOCKER_INFLUXDB_INIT_ORG: "${INFLUXDB_ORG}"
      DOCKER_INFLUXDB_INIT_BUCKET: "${INFLUXDB_DMARC_BUCKET}"
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${INFLUXDB_TOKEN}"
      DOCKER_INFLUXDB_INIT_RETENTION: "365d"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
      - ./influxdb/init:/docker-entrypoint-initdb.d:ro
    mem_limit: 1g
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dmarc_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - influxdb
    mem_limit: 128m
    cpus: "0.25"
    networks:
      - dmarc_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  influxdb_data:
  influxdb_config:
  caddy_data:
  caddy_config:
  parsedmarc_data:

networks:
  dmarc_net:
    driver: bridge
