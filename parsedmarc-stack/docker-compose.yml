# Pintel DMARC Stack
# Services:
#   parsedmarc     - watches Gmail DMARC inbox and writes reports to /data/aggregate.json
#   influx_writer  - tails aggregate.json and writes DMARC points to InfluxDB
#   influxdb       - time-series DB shared with deliverability_monitor
#   grafana        - DMARC dashboards
#   caddy          - reverse proxy for Grafana and InfluxDB
#
# All data is persisted in named Docker volumes.
# Run: docker compose up -d

services:
  parsedmarc:
    build:
      context: ./parsedmarc
      dockerfile: Dockerfile
    container_name: parsedmarc
    restart: unless-stopped
    env_file: ../.env
    environment:
      PARSEDMARC_MAILBOX_BATCH_SIZE: "${PARSEDMARC_MAILBOX_BATCH_SIZE:-10}"
      PARSEDMARC_MAILBOX_REPORTS_FOLDER: "INBOX"
      PARSEDMARC_MAILBOX_ARCHIVE_FOLDER: "Archive"
      PARSEDMARC_IMAP_HOST: "${DMARC_IMAP_HOST}"
      PARSEDMARC_IMAP_PORT: "${DMARC_IMAP_PORT}"
      PARSEDMARC_IMAP_USER: "${DMARC_MAILBOX_USER}"
      PARSEDMARC_IMAP_PASSWORD: "${DMARC_MAILBOX_APP_PASSWORD}"
    volumes:
      - parsedmarc_data:/data
    depends_on:
      influxdb:
        condition: service_healthy
      influx_writer:
        condition: service_started
    networks:
      - dmarc_net
    mem_limit: 512m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "parsedmarc"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  influx_writer:
    build:
      context: ./influx_writer
      dockerfile: Dockerfile
    container_name: influx_writer
    restart: unless-stopped
    env_file: ../.env
    environment:
      INFLUX_URL: "http://influxdb:8086"
      INFLUX_ORG: "${INFLUXDB_ORG}"
      INFLUX_TOKEN: "${INFLUXDB_TOKEN}"
      INFLUX_BUCKET: "${INFLUXDB_DMARC_BUCKET}"
      AGGREGATE_FILE: "/data/aggregate.json"
      POLL_INTERVAL: "30"
    volumes:
      - parsedmarc_data:/data
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - dmarc_net
    mem_limit: 256m
    cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  influxdb:
    image: influxdb:2.7-alpine
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: "${INFLUXDB_ADMIN_USER}"
      DOCKER_INFLUXDB_INIT_PASSWORD: "${INFLUXDB_ADMIN_PASSWORD}"
      DOCKER_INFLUXDB_INIT_ORG: "${INFLUXDB_ORG}"
      DOCKER_INFLUXDB_INIT_BUCKET: "${INFLUXDB_DMARC_BUCKET}"
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${INFLUXDB_TOKEN}"
      DOCKER_INFLUXDB_INIT_RETENTION: "365d"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
      - ./influxdb/init:/docker-entrypoint-initdb.d:ro
    mem_limit: 1g
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dmarc_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:-http://localhost:3000}"
      GF_SERVER_DOMAIN: "${GRAFANA_DOMAIN:-localhost}"
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: "grafana-worldmap-panel,grafana-piechart-panel"
      GF_DATASOURCES_DEFAULT_ORG: "${INFLUXDB_ORG}"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      influxdb:
        condition: service_healthy
    mem_limit: 512m
    cpus: "0.5"
    networks:
      - dmarc_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - grafana
      - influxdb
    mem_limit: 128m
    cpus: "0.25"
    networks:
      - dmarc_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  influxdb_data:
  influxdb_config:
  grafana_data:
  caddy_data:
  caddy_config:
  parsedmarc_data:

networks:
  dmarc_net:
    driver: bridge
